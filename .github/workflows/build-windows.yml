name: Build Windows .exe

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.81.0 spotipy pyinstaller

      - name: Build .exe with flet pack
        run: |
          flet pack main.py --name "WorkflowHub" --product-name "Workflow Hub" --product-version "1.0.0" -y

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorkflowHub-Windows
          path: dist/WorkflowHub.exe
          retention-days: 30
